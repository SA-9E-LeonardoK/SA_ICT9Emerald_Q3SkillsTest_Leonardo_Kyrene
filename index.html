<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes website responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap for styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Custom CSS files -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="registration.css">

    <title>Registration | Chiikawa Express</title>
</head>
<body>

<!-- ================= NAVIGATION BAR ================= -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">

        <!-- Logo that redirects to homepage -->
        <a class="navbar-brand" href="index.html">
            <img src="logo.png" alt="Chiikawa Express" width="60">
        </a>

        <!-- Navigation Links -->
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="page4.html">Booking</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Staff</a></li>
            <li class="nav-item"><a class="nav-link" href="page2.html">Register</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
        </ul>

        <!-- Language Dropdown -->
        <div class="dropdown">
            <button class="btn dropdown-toggle lang-btn" type="button" data-bs-toggle="dropdown">
                Language
            </button>

            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">English</a></li>
                <li><a class="dropdown-item" href="#">日本語</a></li>
            </ul>
        </div>

    </div>
</nav>

<!-- ================= REGISTRATION SECTION ================= -->
<section class="registration">

    <h1>Registration</h1>
    <p>Register and keep track of your bookings!</p>

    <div class="registration-card">

        <!-- ===== LEFT PANEL (Profile Upload) ===== -->
        <div class="left-panel">

            <!-- Profile Image Placeholder -->
            <div class="profile-placeholder">
                <img src="placeholder.jpg">
            </div>

            <!-- File Upload Input -->
            <input type="file" id="upload">

            <!-- Upload Button -->
            <button class="upload-btn">Upload Photo</button>

        </div>

        <!-- ===== RIGHT PANEL (Registration Form) ===== -->
        <div class="right-panel">

            <form>

                <!-- Personal Information -->
                <label>First Name</label>
                <input type="text" placeholder="Enter your first name">

                <label>Last Name</label>
                <input type="text" placeholder="Enter your last name">

                <!-- Age & Contact Row -->
                <div class="form-row">

                    <div>
                        <label>Age</label>
                        <input type="number" placeholder="Enter here">
                    </div>

                    <div>
                        <label>Contact Number</label>
                        <input type="text" placeholder="Enter here">
                    </div>

                </div>

                <!-- Email -->
                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <!-- Login Credentials -->
                <label>Username</label>
                <input type="text" placeholder="Create your username">

                <label>Password</label>
                <input type="password" placeholder="Form your password">

                <!-- Terms & Policy Checkbox -->
                <div class="terms">
                    <input type="checkbox">

                    <span>
                        I accept the 
                        <!-- Links to Terms and Privacy pages -->
                        <a href="https://chiikawapark-tokyo.jp/en/" target="_blank">Terms of Use</a> 
                        and 
                        <a href="https://chiikawapark-tokyo.jp/faq" target="_blank">Privacy Policy</a>
                    </span>

                </div>

                <!-- Submit Button -->
                <button type="button" class="submit-btn" onclick="submitForm()">
                    Create my account
                </button>

            </form>

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2026 9-Emerald | Aisha Alshamsi & Kyrene Leonardo</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JavaScript -->
<script src="script.js"></script>

</body>
</html>
